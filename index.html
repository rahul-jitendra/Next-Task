<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexTask — Offline-First Productivity</title>
<meta name="description" content="Offline-first productivity system with task management, activity tracking, and timetable scheduling.">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="#" />
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Firebase SDK v10 (modular via compat for single-file use) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
/* ═══════════════════════════════════════
   CSS VARIABLES & RESET
═══════════════════════════════════════ */
:root{
  --bg:#0a0a0f; --bg2:#111118; --bg3:#1a1a24; --bg4:#22222f; --surface:#2a2a3a;
  --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.15);
  --text:#f0f0f8; --text2:#9898b8; --text3:#5a5a7a;
  --accent:#7c5cfc; --accent2:#a78bfa;
  --teal:#0fb8a0; --teal2:#2dd4c0;
  --amber:#f59e0b; --amber2:#fbbf24;
  --red:#ef4444; --red2:#f87171;
  --green:#10b981; --green2:#34d399;
  --pink:#ec4899; --pink2:#f472b6;
  --mono:'JetBrains Mono',monospace;
  --sans:'Space Grotesk',sans-serif;
  --r:12px; --r2:8px;
  --ease:cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button,input,select,textarea{font-family:var(--sans)}
::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
a{color:inherit;text-decoration:none}

/* ═══════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(124,92,252,.4)}50%{box-shadow:0 0 0 6px rgba(124,92,252,0)}}
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{box-shadow:0 0 0 5px rgba(16,185,129,0)}}
@keyframes bgFloat{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:.9;transform:scale(1.08)}}
@keyframes slideToast{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ringPop{0%{stroke-dashoffset:490}100%{stroke-dashoffset:var(--target)}}
.fade-up{animation:fadeUp .4s var(--ease) both}
.scale-in{animation:scaleIn .3s var(--ease) both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}

/* ═══════════════════════════════════════
   AMBIENT BACKGROUND
═══════════════════════════════════════ */
#app-root::before,#app-root::after{content:'';position:fixed;pointer-events:none;z-index:0;border-radius:50%}
#app-root::before{top:-30%;left:-15%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(124,92,252,.12) 0%,transparent 65%);animation:bgFloat 9s ease-in-out infinite}
#app-root::after{bottom:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(ellipse,rgba(15,184,160,.08) 0%,transparent 65%);animation:bgFloat 11s ease-in-out infinite reverse}

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
#app-root{position:relative;z-index:1}
.layout{display:flex;height:100vh}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
.sidebar{width:240px;min-width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .25s var(--ease);flex-shrink:0}
.sidebar-logo{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--teal));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-.5px}.logo-text span{color:var(--accent2)}
.sidebar-status{margin:10px 12px;padding:7px 11px;border-radius:var(--r2);display:flex;align-items:center;gap:8px;font-size:12px;transition:all .3s}
.st-online{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--green2)}
.st-offline{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red2)}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:currentColor}
.st-online .status-dot{animation:dotPulse 2s ease-in-out infinite}
.sidebar-nav{padding:8px 0;flex:1;overflow-y:auto}
.nav-sec{padding:12px 16px 4px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;margin:1px 8px;cursor:pointer;border-radius:var(--r2);font-size:14px;color:var(--text2);transition:all .2s var(--ease);position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(124,92,252,.15);color:var(--accent2);font-weight:500}
.nav-item.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:0 2px 2px 0}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg3);border-radius:var(--r2);cursor:pointer;transition:background .2s}
.user-row:hover{background:var(--bg4)}
.user-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--accent)}
.user-name{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;border:none;color:var(--text3);font-size:14px;transition:all .2s;flex-shrink:0}
.logout-btn:hover{background:rgba(239,68,68,.15);color:var(--red2)}

/* ═══════════════════════════════════════
   MAIN
═══════════════════════════════════════ */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{height:60px;background:rgba(17,17,24,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:18px;font-weight:600;flex:1}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;width:200px;transition:border-color .2s}
.search-wrap:focus-within{border-color:var(--border2)}
.search-wrap input{background:none;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:13px;width:100%}
.search-wrap input::placeholder{color:var(--text3)}
.page-content{padding:28px;flex:1}

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn{padding:8px 16px;border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--sans);transition:all .2s var(--ease);display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-primary:active{transform:scale(.98)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg4);color:var(--text)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red2);border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.icon-btn{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text3);border:none;background:transparent;transition:all .2s}
.icon-btn:hover{background:var(--bg4);color:var(--text2)}
.icon-btn.play{background:rgba(16,185,129,.1);color:var(--green2)}
.icon-btn.play:hover{background:rgba(16,185,129,.25)}
.icon-btn.del{color:var(--red2)}
.icon-btn.del:hover{background:rgba(239,68,68,.12)}

/* ═══════════════════════════════════════
   SECTION HEADER
═══════════════════════════════════════ */
.sec-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.sec-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
.sec-sub{font-size:14px;color:var(--text2);margin-top:3px}

/* ═══════════════════════════════════════
   GRID
═══════════════════════════════════════ */
.grid{display:grid;gap:16px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:1fr 1fr}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.g4,.g3,.g2{grid-template-columns:1fr}.sidebar{width:56px;min-width:56px}.hide-sm{display:none!important}.topbar-title{font-size:15px}}

/* ═══════════════════════════════════════
   CARDS
═══════════════════════════════════════ */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;transition:all .25s var(--ease)}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;opacity:.08;transform:translate(30%,-30%);background:var(--sc,var(--accent))}
.stat-icon{font-size:22px;margin-bottom:12px}
.stat-num{font-size:32px;font-weight:700;letter-spacing:-1px;font-family:var(--mono);line-height:1}
.stat-label{font-size:13px;color:var(--text2);margin-top:6px}
.stat-trend{font-size:12px;font-weight:600;margin-top:8px;color:var(--green2)}

/* ═══════════════════════════════════════
   TAGS & BADGES
═══════════════════════════════════════ */
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.t-purple{background:rgba(124,92,252,.15);color:var(--accent2)}
.t-teal{background:rgba(15,184,160,.15);color:var(--teal2)}
.t-amber{background:rgba(245,158,11,.15);color:var(--amber2)}
.t-red{background:rgba(239,68,68,.15);color:var(--red2)}
.t-green{background:rgba(16,185,129,.15);color:var(--green2)}
.t-pink{background:rgba(236,72,153,.15);color:var(--pink2)}
.t-gray{background:rgba(255,255,255,.06);color:var(--text2)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-high{background:var(--red)}.d-medium{background:var(--amber)}.d-low{background:var(--green)}

/* ═══════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════ */
.prog-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .8s var(--ease)}
.pf-purple{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.pf-teal{background:linear-gradient(90deg,var(--teal),var(--teal2))}
.pf-amber{background:linear-gradient(90deg,var(--amber),var(--amber2))}
.pf-green{background:linear-gradient(90deg,var(--green),var(--green2))}

/* ═══════════════════════════════════════
   TASK ITEMS
═══════════════════════════════════════ */
.task-list{display:flex;flex-direction:column;gap:10px}
.task-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;display:flex;align-items:flex-start;gap:14px;transition:all .2s var(--ease);position:relative;overflow:hidden}
.task-item:hover{border-color:var(--border2);background:var(--bg3)}
.task-item.is-completed{opacity:.5}
.task-item.is-active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.task-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;margin-top:1px;font-size:11px}
.task-check:hover{border-color:var(--accent)}
.task-check.is-done{background:var(--green);border-color:var(--green);color:#fff}
.task-body{flex:1;min-width:0}
.task-title-row{font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.task-title.striked{text-decoration:line-through;color:var(--text3)}
.task-desc-text{font-size:13px;color:var(--text2);margin-top:3px;line-height:1.5}
.task-meta{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.task-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.dl-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);font-family:var(--mono)}
.dl-urgent{color:var(--red2)}

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
.tab-group{display:flex;background:var(--bg3);border-radius:var(--r2);padding:4px;width:fit-content;margin-bottom:20px;flex-wrap:wrap;gap:2px}
.tab{padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;border-radius:6px;color:var(--text2);transition:all .2s;white-space:nowrap}
.tab.active{background:var(--bg4);color:var(--text)}
.tab:hover:not(.active){color:var(--text)}

/* ═══════════════════════════════════════
   FORMS
═══════════════════════════════════════ */
.form-group{margin-bottom:16px}
.form-label{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:7px;display:block}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;font-size:14px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-select{appearance:none;cursor:pointer}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:flex;gap:14px;flex-wrap:wrap}
.form-row .form-group{flex:1;min-width:140px}
.form-err{border-color:var(--red)!important}

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;animation:scaleIn .2s var(--ease)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:scaleIn .25s var(--ease)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-title{font-size:18px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg3);border:none;color:var(--text3);font-size:16px;transition:all .2s}
.modal-close:hover{background:var(--bg4);color:var(--text)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}

/* ═══════════════════════════════════════
   TIMER
═══════════════════════════════════════ */
.timer-ring{position:relative;width:180px;height:180px;margin:0 auto 20px}
.timer-ring svg{transform:rotate(-90deg)}
.ring-bg{stroke:var(--bg4);fill:none}
.ring-fill{fill:none;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .4s}
.timer-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:150px}
.timer-time{font-family:var(--mono);font-size:26px;font-weight:600;line-height:1;transition:color .4s}
.timer-sub{font-size:11px;color:var(--text3);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ═══════════════════════════════════════
   TIMETABLE
═══════════════════════════════════════ */
.timetable{display:flex;flex-direction:column;position:relative}
.timetable::before{content:'';position:absolute;left:62px;top:0;bottom:0;width:1px;background:var(--border)}
.time-slot{display:flex;gap:14px;min-height:56px;position:relative}
.time-lbl{font-family:var(--mono);font-size:11px;color:var(--text3);width:50px;text-align:right;padding-top:4px;flex-shrink:0}
.slot-body{flex:1;padding:4px 0 4px 14px}
.now-line{display:flex;align-items:center;gap:8px;margin:-3px 0;z-index:5;position:relative}
.now-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;margin-left:54px}
.now-bar{flex:1;height:1px;background:var(--red);opacity:.6}
.sched-block{padding:9px 13px;border-radius:var(--r2);margin-bottom:4px;font-size:13px;font-weight:500;border-left:3px solid;cursor:pointer;transition:all .2s}
.sched-block:hover{transform:translateX(3px);filter:brightness(1.1)}
.sb-purple{background:rgba(124,92,252,.12);border-color:var(--accent);color:var(--accent2)}
.sb-teal{background:rgba(15,184,160,.12);border-color:var(--teal);color:var(--teal2)}
.sb-amber{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber2)}
.sb-green{background:rgba(16,185,129,.12);border-color:var(--green);color:var(--green2)}
.sb-pink{background:rgba(236,72,153,.12);border-color:var(--pink);color:var(--pink2)}
.sb-gray{background:rgba(255,255,255,.05);border-color:var(--text3);color:var(--text2)}
.sched-time{font-size:11px;opacity:.7;font-family:var(--mono);margin-top:2px}

/* ═══════════════════════════════════════
   ACTIVITY LOG
═══════════════════════════════════════ */
.act-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg3);border-radius:var(--r2);border:1px solid var(--border);transition:all .2s;margin-bottom:8px}
.act-item:hover{border-color:var(--border2)}
.act-dur{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--teal2);min-width:52px}
.act-note{font-size:12px;color:var(--text2);margin-top:2px}
.act-time{font-family:var(--mono);font-size:11px;color:var(--text3);white-space:nowrap}

/* ═══════════════════════════════════════
   BAR CHART
═══════════════════════════════════════ */
.bar-chart{display:flex;align-items:flex-end;justify-content:space-between;height:150px;gap:5px;padding:0 4px}
.bar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .8s var(--ease),filter .2s;cursor:pointer}
.bar:hover{filter:brightness(1.25)}
.bv{background:linear-gradient(180deg,var(--accent),rgba(124,92,252,.3))}
.bt{background:linear-gradient(180deg,var(--teal),rgba(15,184,160,.3))}
.ba{background:linear-gradient(180deg,var(--amber),rgba(245,158,11,.3))}
.bar-lbl{font-size:10px;color:var(--text3);font-family:var(--mono)}
.bar-val{font-size:10px;font-weight:600;color:var(--text2);font-family:var(--mono)}

/* ═══════════════════════════════════════
   DONUT
═══════════════════════════════════════ */
.donut-wrap{display:flex;align-items:center;gap:22px}
.donut-chart{position:relative;width:120px;height:120px;flex-shrink:0}
.donut-chart svg{transform:rotate(-90deg)}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.donut-num{font-size:22px;font-weight:700;font-family:var(--mono);line-height:1}
.donut-sub{font-size:10px;color:var(--text3);margin-top:2px}
.donut-legend{display:flex;flex-direction:column;gap:8px;flex:1}
.leg-item{display:flex;align-items:center;gap:8px;font-size:13px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-label{color:var(--text2);flex:1}

<body>
<div id="app-root"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// ██████╗  ██████╗  ███╗   ██╗███████╗██╗ ██████╗
// ██╔════╝██╔═══██╗████╗  ██║██╔════╝██║██╔════╝
// ██║     ██║   ██║██╔██╗ ██║█████╗  ██║██║  ███╗
// ██║     ██║   ██║██║╚██╗██║██╔══╝  ██║██║   ██║
// ╚██████╗╚██████╔╝██║ ╚████║██║     ██║╚██████╔╝
//  ╚═════╝ ╚═════╝ ╚═╝  ╚═══╝╚═╝     ╚═╝ ╚═════╝
// ═══════════════════════════════════════════════════════════════
//
//  SETUP INSTRUCTIONS:
//  1. Go to https://console.firebase.google.com
//  2. Create a project → Add Web App → copy config below
//  3. Enable: Authentication → Google sign-in
//  4. Enable: Firestore Database (production mode)
//  5. Paste Firestore Security Rules (see README section)
//  6. Deploy to Vercel / Netlify / GitHub Pages / any static host
//
// ═══════════════════════════════════════════════════════════════

// ── PASTE YOUR FIREBASE CONFIG HERE ─────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
// ─────────────────────────────────────────────────────────────

// ── DEMO MODE: if config is not filled, run with local storage ─
const DEMO_MODE = FIREBASE_CONFIG.apiKey === "YOUR_API_KEY";

// ═══════════════════════════════════════════════════════════════
// STATE MANAGER
// ═══════════════════════════════════════════════════════════════
const State = (() => {
  const listeners = {};
  const state = {
    user: undefined,        // undefined=loading, null=signed-out
    page: 'dashboard',
    tasks: [],
    activities: [],
    schedules: [],
    loading: true,
    online: navigator.onLine,
    timerRunning: false,
    timerSeconds: 0,
    timerTaskId: '',
    timerStartedAt: null,
    taskFilter: 'all',
    taskSearch: '',
    toastQueue: [],
    modal: null,            // null | 'addTask'
    syncPending: 0,
  };
  function emit(key) { (listeners[key]||[]).forEach(fn=>fn(state)); (listeners['*']||[]).forEach(fn=>fn(state)); }
  function set(updates) { Object.assign(state, updates); Object.keys(updates).forEach(emit); emit('*'); }
  function on(key, fn) { listeners[key] = listeners[key]||[]; listeners[key].push(fn); }
  function get() { return state; }
  return { set, get, on };
})();

// ═══════════════════════════════════════════════════════════════
// FIREBASE / DEMO STORAGE
// ═══════════════════════════════════════════════════════════════
let db = null, auth = null;

function initFirebase() {
  if (DEMO_MODE) { initDemoMode(); return; }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    auth = firebase.auth();
    db   = firebase.firestore();
    db.enablePersistence({ synchronizeTabs: true }).catch(()=>{});
    auth.onAuthStateChanged(user => {
      State.set({ user, loading: false });
      if (user) loadData(user.uid);
    });
  } catch(e) {
    console.warn('Firebase init failed, falling back to demo mode:', e);
    initDemoMode();
  }
}

// ── Demo (localStorage) mode ───────────────────────────────────
function initDemoMode() {
  const saved = JSON.parse(localStorage.getItem('nextask_data')||'{}');
  State.set({
    user: { uid:'demo', displayName:'Demo User', email:'demo@nextask.app', photoURL:null },
    tasks:      saved.tasks      || getDemoTasks(),
    activities: saved.activities || getDemoActivities(),
    schedules:  saved.schedules  || getDemoSchedules(),
    loading: false,
  });
}
function saveDemoData() {
  const s = State.get();
  localStorage.setItem('nextask_data', JSON.stringify({ tasks:s.tasks, activities:s.activities, schedules:s.schedules }));
}

// ── Firestore data loading ─────────────────────────────────────
function loadData(uid) {
  const col = (c) => db.collection('users').doc(uid).collection(c);
  col('tasks').orderBy('createdAt','desc').onSnapshot(snap=>{
    State.set({ tasks: snap.docs.map(d=>({id:d.id,...d.data()})) });
  });
  col('activities').orderBy('startTime','desc').onSnapshot(snap=>{
    State.set({ activities: snap.docs.map(d=>({id:d.id,...d.data()})) });
  });
  col('schedules').onSnapshot(snap=>{
    State.set({ schedules: snap.docs.map(d=>({id:d.id,...d.data()})) });
  });
}

// ── CRUD helpers ───────────────────────────────────────────────
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function now()   { return new Date().toISOString(); }

async function addTask(data) {
  const s = State.get();
  const task = { id:genId(), ...data, loggedHours:0, createdAt:now(), updatedAt:now() };
  if (DEMO_MODE || !s.user?.uid) {
    State.set({ tasks:[task,...s.tasks] }); saveDemoData(); return task.id;
  }
  const uid = s.user.uid;
  await db.collection('users').doc(uid).collection('tasks').doc(task.id).set(task);
  return task.id;
}
async function updateTask(id, data) {
  const s = State.get();
  const updated = s.tasks.map(t=>t.id===id?{...t,...data,updatedAt:now()}:t);
  if (DEMO_MODE || !s.user?.uid) { State.set({ tasks:updated }); saveDemoData(); return; }
  await db.collection('users').doc(s.user.uid).collection('tasks').doc(id).update({...data,updatedAt:now()});
}
async function deleteTask(id) {
  const s = State.get();
  if (DEMO_MODE || !s.user?.uid) { State.set({ tasks:s.tasks.filter(t=>t.id!==id) }); saveDemoData(); return; }
  await db.collection('users').doc(s.user.uid).collection('tasks').doc(id).delete();
}
async function addActivity(data) {
  const s = State.get();
  const act = { id:genId(), ...data, createdAt:now() };
  const task = s.tasks.find(t=>t.id===data.taskId);
  if (DEMO_MODE || !s.user?.uid) {
    const newActs = [act, ...s.activities];
    const newTasks = s.tasks.map(t=>t.id===data.taskId?{...t,loggedHours:(t.loggedHours||0)+data.durationMin/60,status:t.status==='pending'?'active':t.status}:t);
    State.set({ activities:newActs, tasks:newTasks }); saveDemoData(); return;
  }
  const uid = s.user.uid;
  await db.collection('users').doc(uid).collection('activities').doc(act.id).set(act);
  if (task) {
    await db.collection('users').doc(uid).collection('tasks').doc(task.id).update({
      loggedHours: (task.loggedHours||0)+data.durationMin/60,
      status: task.status==='pending'?'active':task.status,
      updatedAt: now()
    });
  }
}
async function addSchedule(data) {
  const s = State.get();
  const sched = { id:genId(), ...data, createdAt:now() };
  if (DEMO_MODE || !s.user?.uid) { State.set({ schedules:[...s.schedules,sched] }); saveDemoData(); return; }
  await db.collection('users').doc(s.user.uid).collection('schedules').doc(sched.id).set(sched);
}
async function deleteSchedule(id) {
  const s = State.get();
  if (DEMO_MODE || !s.user?.uid) { State.set({ schedules:s.schedules.filter(x=>x.id!==id) }); saveDemoData(); return; }
  await db.collection('users').doc(s.user.uid).collection('schedules').doc(id).delete();
}

// ── Auth ───────────────────────────────────────────────────────
async function signInGoogle() {
  if (DEMO_MODE) return;
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt:'select_account' });
  try { await auth.signInWithPopup(provider); }
  catch(e) { showToast('❌','Sign In Failed',e.message); }
}
function signOutUser() {
  if (DEMO_MODE) { State.set({ user:null, tasks:[], activities:[], schedules:[] }); renderApp(); return; }
  auth.signOut();
}

// ── Online/offline ─────────────────────────────────────────────
window.addEventListener('online',  ()=>{ State.set({ online:true  }); renderApp(); });
window.addEventListener('offline', ()=>{ State.set({ online:false }); renderApp(); });

// ═══════════════════════════════════════════════════════════════
// DEMO DATA
// ═══════════════════════════════════════════════════════════════
function getDemoTasks() {
  return [
    { id:'t1', title:'Build REST API endpoints', description:'FastAPI routes for tasks, activities, and sync', priority:'high', deadline:'2026-03-22', tags:['dev','backend'], status:'active', estHours:6, loggedHours:3.5, createdAt:now(), updatedAt:now() },
    { id:'t2', title:'Design OLED UI for ESP32', description:'Minimal interface showing task name and timer', priority:'high', deadline:'2026-03-24', tags:['design','iot'], status:'pending', estHours:4, loggedHours:0, createdAt:now(), updatedAt:now() },
    { id:'t3', title:'SQLite schema migration', description:'Add event_log and sync queue tables', priority:'medium', deadline:'2026-03-20', tags:['dev','db'], status:'active', estHours:2, loggedHours:1.8, createdAt:now(), updatedAt:now() },
    { id:'t4', title:'Write MQTT broker config', description:'Mosquitto config for device mesh network', priority:'medium', deadline:'2026-03-26', tags:['docs','iot'], status:'pending', estHours:3, loggedHours:0, createdAt:now(), updatedAt:now() },
    { id:'t5', title:'React Native activity tracker', description:'Session tracking UI component for mobile app', priority:'high', deadline:'2026-03-23', tags:['dev','mobile'], status:'pending', estHours:8, loggedHours:0, createdAt:now(), updatedAt:now() },

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
let toastTimer = null;
function showToast(icon, title, sub='') {
  const el = document.getElementById('toast-el');
  if (el) el.remove();
  clearTimeout(toastTimer);
  const t = document.createElement('div');
  t.id = 'toast-el'; t.className = 'toast';
  t.innerHTML = `<span style="font-size:18px;flex-shrink:0">${icon}</span><div class="toast-body"><div class="ttl">${title}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;
  document.body.appendChild(t);
  toastTimer = setTimeout(()=>t.remove(), 3500);
}

// ═══════════════════════════════════════════════════════════════
// TIMER ENGINE
// ═══════════════════════════════════════════════════════════════
let timerInterval = null;
function startTimer(taskId) {
  State.set({ timerRunning:true, timerTaskId:taskId, timerStartedAt:new Date(), timerSeconds:0 });
  timerInterval = setInterval(()=>{
    State.set({ timerSeconds: State.get().timerSeconds+1 });
    updateTimerUI();
  },1000);
  updateTimerUI();
}
function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  State.set({ timerRunning:false });
  updateTimerUI();
}
function resetTimer() {
  stopTimer();
  State.set({ timerSeconds:0, timerTaskId:'', timerStartedAt:null });
  updateTimerUI();
}
function fmtTime(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return `${pad(h)}:${pad(m)}:${pad(sec)}`; }
function pad(n){ return String(n).padStart(2,'0'); }
function updateTimerUI() {
  const s = State.get();
  const tEl = document.getElementById('timer-display');
  const sEl = document.getElementById('timer-sub');
  const ringEl = document.getElementById('timer-ring');
  const btnEl  = document.getElementById('timer-toggle-btn');
  if (!tEl) return;
  tEl.textContent = fmtTime(s.timerSeconds);
  tEl.style.color = s.timerRunning ? 'var(--green2)' : 'var(--text)';
  if (sEl) {
    const task = s.tasks.find(t=>t.id===s.timerTaskId);
    sEl.textContent = task ? task.title : 'No task selected';
  }
  if (ringEl) {
    const circ = 490, pct = Math.min(s.timerSeconds/3600,1);
    const offset = circ - pct*circ;
    ringEl.style.strokeDashoffset = offset;
    ringEl.style.stroke = s.timerRunning ? 'var(--green)' : 'var(--accent)';
  }
  if (btnEl) {
    btnEl.textContent = s.timerRunning ? '⏹ Stop Session' : '▶ Start Session';
    btnEl.style.background = s.timerRunning ? 'var(--red)' : '';
  }
}
async function saveSession() {
  const s = State.get();
  if (!s.timerTaskId || s.timerSeconds < 10) { showToast('⚠️','Too short','Record at least 10 seconds'); return; }
  const mins = Math.max(1, Math.floor(s.timerSeconds/60));
  const end = new Date();
  const start = s.timerStartedAt || new Date(end - mins*60000);
  const noteEl = document.getElementById('session-note');
  const note = noteEl ? noteEl.value : '';
  await addActivity({ taskId:s.timerTaskId, taskName:s.tasks.find(t=>t.id===s.timerTaskId)?.title||'Unknown', startTime:start.toISOString(), endTime:end.toISOString(), durationMin:mins, notes:note });
  resetTimer();
  document.getElementById('session-note-wrap').style.display='none';
  showToast('💾','Session Saved',`${mins} minutes logged`);
  renderActivitySummary();
}

function tagCls(t){ return TAG_COLOR[t]||'t-gray'; }
function deadlineBadge(d){
  if(!d) return '';
  const dd=new Date(d), diff=Math.ceil((dd-new Date())/86400000);
  if(diff<0)  return `<span class="dl-badge dl-urgent">⚠ Overdue</span>`;
  if(diff===0)return `<span class="dl-badge dl-urgent">🔥 Today</span>`;
  if(diff===1)return `<span class="dl-badge dl-urgent">⏰ Tomorrow</span>`;
  return `<span class="dl-badge">📅 ${d}</span>`;
}

function formatDur(m){ const h=Math.floor(m/60); return h?`${h}h ${m%60}m`:`${m}m`; }
function formatTime(iso){ if(!iso)return '—'; const d=new Date(iso); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }

function renderActivityLog() {
  const s=State.get();
  if (!s.activities.length) return `<div class="empty"><div class="empty-icon">⏱</div>No sessions recorded yet</div>`;
  return s.activities.slice(0,12).map(a=>`<div class="act-item fade-up">
    <span class="act-dur">${formatDur(a.durationMin||0)}</span>
    <div style="flex:1;min-width:0">
      <div style="font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.taskName||'Unknown'}</div>
      ${a.notes?`<div class="act-note">${a.notes}</div>`:''}
    </div>
    <span class="act-time">${formatTime(a.startTime)} – ${formatTime(a.endTime)}</span>
  </div>`).join('');
}
function renderActivitySummary() {
  const el=document.getElementById('activity-log-card');
  if(el) el.querySelector('.fade-up'+',.act-item')?.remove();
  const card=document.getElementById('activity-log-card');
  if(card) { const inner=card.querySelector('div:last-child'); if(inner)inner.innerHTML=renderActivityLog(); }
}
function onTimerToggle() {
  const s=State.get();
  const selEl=document.getElementById('session-task-sel');
  const taskId=selEl?selEl.value:s.timerTaskId;
  if(!s.timerRunning) {
    if(!taskId){showToast('⚠️','Select a task','Choose which task you\'re working on');return;}
    State.set({timerTaskId:taskId});
    startTimer(taskId);
  } else {
    stopTimer();
    const nw=document.getElementById('session-note-wrap');
    if(nw) nw.style.display='block';
  }
}

const HOURS=['07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];
function renderTimetable() {
  const s=State.get(); const now=new Date(); const nowMins=now.getHours()*60+now.getMinutes();
  const blocks=s.schedules.length>0?s.schedules:getDemoSchedules();
  const totalMin=blocks.reduce((a,b)=>{const s=parseInt(b.start)*60+parseInt(b.start.split(':')[1]),e=parseInt(b.end)*60+parseInt(b.end.split(':')[1]);return a+(e-s);},0);
  return `<div class="page-content">
    <div class="sec-header fade-up">
      <div><div class="sec-title">Timetable</div><div class="sec-sub">${now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div></div>
      <button class="btn btn-primary" onclick="openModal('addSchedule')">+ Add Block</button>
    </div>
    <div class="grid g2">
      <div class="card">
        <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px">Day View</div>
        <div class="timetable">
          ${HOURS.map((h,i)=>{
            const hm=parseInt(h)*60+parseInt(h.split(':')[1]);
            const nm=i<HOURS.length-1?parseInt(HOURS[i+1])*60+parseInt(HOURS[i+1].split(':')[1]):hm+60;
            const inSlot=blocks.filter(b=>{const bs=parseInt(b.start)*60+parseInt(b.start.split(':')[1]);return bs>=hm&&bs<nm;});
            const showNow=nowMins>=hm&&nowMins<nm;
            return `<div class="time-slot">
              <div class="time-lbl">${h}</div>
              <div class="slot-body">
                ${showNow?`<div class="now-line"><div class="now-dot"></div><div class="now-bar"></div></div>`:''}
                ${inSlot.map(b=>`<div class="sched-block sb-${b.color||'gray'}" onclick="deleteScheduleBlock('${b.id}')" title="Click to remove">${b.title}<div class="sched-time">${b.start} – ${b.end}</div></div>`).join('')}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div>
        <div class="card" style="margin-bottom:14px">
          <div style="font-size:13px;font-weight:600;margin-bottom:12px">Summary</div>
          ${[['Blocks',blocks.length],['Scheduled',`${Math.floor(totalMin/60)}h ${totalMin%60}m`],['8h Target',`${Math.round(totalMin/480*100)}%`]].map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 12px;background:var(--bg3);border-radius:8px;font-size:13px;margin-bottom:6px"><span style="color:var(--text2)">${k}</span><span style="font-family:var(--mono);font-weight:600">${v}</span></div>`).join('')}
        </div>
        <div class="card">
          <div style="font-size:13px;font-weight:600;margin-bottom:12px">All Blocks</div>
          <div style="display:flex;flex-direction:column;gap:5px">
            ${blocks.map(b=>{const C={purple:'var(--accent)',teal:'var(--teal)',amber:'var(--amber)',green:'var(--green)',pink:'var(--pink)'}; return `<div style="display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg3);border-radius:8px;font-size:13px"><div style="width:7px;height:7px;border-radius:50%;background:${C[b.color]||'var(--text3)'};flex-shrink:0"></div><span style="flex:1;font-weight:500">${b.title}</span><span style="font-family:var(--mono);font-size:10px;color:var(--text3)">${b.start}–${b.end}</span><button class="icon-btn del" style="width:20px;height:20px" onclick="deleteScheduleBlock('${b.id}')">✕</button></div>`;}).join('')}
            ${blocks.length===0?`<div class="empty" style="padding:20px"><div class="empty-icon">📅</div>No schedule blocks</div>`:''}
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderAnalytics() {
  const s=State.get(); const tasks=s.tasks, acts=s.activities;
  const completed=tasks.filter(t=>t.status==='completed').length;
  const rate=tasks.length?Math.round(completed/tasks.length*100):0;
  const weekH=Array(7).fill(0);
  acts.forEach(a=>{const d=new Date(a.startTime),idx=(d.getDay()+6)%7;weekH[idx]+=(a.durationMin||0)/60;});
  const byTag={}; tasks.forEach(t=>(t.tags||[]).forEach(tg=>{byTag[tg]=(byTag[tg]||0)+1;}));
  const maxH=Math.max(...weekH,1); const maxT=Math.max(...Object.values(byTag),1);
  const evActs=tasks.filter(t=>t.estHours>0).slice(0,5);
  const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  return `<div class="page-content">
    <div class="sec-header fade-up"><div><div class="sec-title">Analytics & Insights</div><div class="sec-sub">Productivity metrics and trends</div></div><span class="tag t-purple">Last 7 Days</span></div>
    <div class="grid g4" style="margin-bottom:20px">
      ${statCard('📋',tasks.length,'Total Tasks','All time','var(--accent)','d1')}
      ${statCard('✅',completed,'Completed',`${rate}% rate`,'var(--teal)','d2')}
      ${statCard('⏱',(acts.reduce((x,a)=>x+(a.durationMin||0),0)/60).toFixed(1)+'h','All Time','Hours logged','var(--amber)','d3')}
      ${statCard('🎯',rate+'%','Completion','Success rate','var(--green)','d4')}
    </div>
    <div class="grid g2">
      <div class="card fade-up d2">
        <div style="font-size:15px;font-weight:600;margin-bottom:14px">Hours Logged Per Day</div>
        <div class="bar-chart">${weekH.map((h,i)=>`<div class="bar-wrap"><div class="bar-val">${h.toFixed(1)}</div><div class="bar bv" style="height:${Math.round(h/maxH*130)}px"></div><div class="bar-lbl">${DAYS[i]}</div></div>`).join('')}</div>
      </div>
      <div class="card fade-up d3">
        <div style="font-size:15px;font-weight:600;margin-bottom:14px">Tasks by Tag</div>
        ${Object.keys(byTag).length===0?`<div class="empty"><div class="empty-icon">🏷</div>Add tags to tasks</div>`:`<div class="bar-chart">${Object.entries(byTag).slice(0,7).map(([tag,cnt])=>`<div class="bar-wrap"><div class="bar-val">${cnt}</div><div class="bar bt" style="height:${Math.round(cnt/maxT*130)}px"></div><div class="bar-lbl" style="max-width:38px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${tag}</div></div>`).join('')}</div>`}
      </div>
    </div>
    ${evActs.length>0?`<div class="card fade-up d4" style="margin-top:18px">
      <div style="font-size:15px;font-weight:600;margin-bottom:16px">Estimated vs Actual Hours</div>
      ${evActs.map(t=>{const pct=t.estHours>0?Math.min(100,Math.round((t.loggedHours||0)/t.estHours*100)):0;return `<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%">${t.title}</span><span style="font-family:var(--mono);color:var(--text2)">${(t.loggedHours||0).toFixed(1)}h / ${t.estHours}h</span></div><div style="height:16px;background:var(--bg4);border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--teal),var(--teal2));border-radius:4px;transition:width 1s var(--ease)"></div></div></div>`;}).join('')}
    </div>`:''}
  </div>`;
}

  return `<div class="page-content">
    <div class="sec-header fade-up"><div><div class="sec-title">Edge Device Compatibility</div><div class="sec-sub">From desktop to microcontroller — one system, one protocol</div></div></div>
    <div class="grid g3" style="margin-bottom:20px">${devs.map(([icon,name,desc,tags])=>`<div class="dev-card"><div class="dev-icon">${icon}</div><div class="dev-name">${name}</div><div class="dev-desc">${desc}</div><div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center">${tags.split(',').map(t=>{const[c,l]=t.split('|');return `<span class="tag ${c}">${l}</span>`;}).join('')}</div></div>`).join('')}</div>
    <div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:14px">ESP32 Firmware Outline</div><div class="code-block"><span class="cc">// NexTask ESP32 Firmware — main.cpp</span><br><span class="ck">#include</span> <span class="cs">"WiFiManager.h"</span><br><span class="ck">#include</span> <span class="cs">"PubSubClient.h"</span>   <span class="cc">// MQTT client</span><br><span class="ck">#include</span> <span class="cs">"ArduinoJson.h"</span>    <span class="cc">// JSON payload parsing</span><br><span class="ck">#include</span> <span class="cs">"SPIFFS.h"</span>         <span class="cc">// Offline task storage</span><br><span class="ck">#include</span> <span class="cs">"SSD1306Wire.h"</span>    <span class="cc">// OLED: SDA=21 SCL=22</span><br><br><span class="cc">// GPIO 14 = start session button</span><br><span class="cc">// GPIO 27 = stop session button</span><br><br><span class="ck">void</span> <span class="cf">loop</span>() {<br>&nbsp;&nbsp;<span class="cc">// displayCurrentTask()   — render task to OLED</span><br>&nbsp;&nbsp;<span class="cc">// pollButtons()          — debounced GPIO read</span><br>&nbsp;&nbsp;<span class="cc">// mqttClient.loop()      — handle MQTT messages</span><br>&nbsp;&nbsp;<span class="cc">// publishActivity()      — send start/stop events</span><br>&nbsp;&nbsp;<span class="cc">// persistToSPIFFS()      — queue writes if offline</span><br>&nbsp;&nbsp;<span class="cc">// syncWhenOnline()       — flush SPIFFS queue</span><br>}</div></div>

    {dot:'rm-active',phase:'Phase 2 — Active',  color:'var(--accent2)', title:'Google Auth + Firebase Offline Sync',  tags:['t-purple|Google OAuth','t-purple|Firestore','t-purple|Offline persistence','t-purple|React PWA']},

// ═══════════════════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════════════════
function openModal(type) {
  const el = document.getElementById('modal-container');
  if (!el) return;
  if (type==='addTask')     el.innerHTML = renderAddTaskModal();
  if (type==='addSchedule') el.innerHTML = renderAddScheduleModal();
}
function closeModal() {
  const el=document.getElementById('modal-container');
  if (el) el.innerHTML='';
}

function renderAddTaskModal() {
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header"><div class="modal-title">New Task</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="form-group"><label class="form-label">Title *</label><input class="form-input" id="m-title" placeholder="What needs to be done?"></div>
      <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="m-desc" placeholder="Optional details…"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Priority</label><select class="form-select" id="m-priority"><option value="high">🔴 High</option><option value="medium" selected>🟡 Medium</option><option value="low">🟢 Low</option></select></div>
        <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="m-status"><option value="pending">Pending</option><option value="active">Active</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Deadline</label><input class="form-input" type="date" id="m-deadline"></div>
        <div class="form-group"><label class="form-label">Est. Hours</label><input class="form-input" type="number" id="m-hours" placeholder="e.g. 4" min="0.5" step="0.5"></div>
      </div>
      <div class="form-group"><label class="form-label">Tags (comma-separated)</label><input class="form-input" id="m-tags" placeholder="dev, design, research…"></div>
      <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitAddTask()">Create Task</button></div>
    </div>
  </div>`;
}
async function submitAddTask() {
  const title=document.getElementById('m-title').value.trim();
  if (!title) { document.getElementById('m-title').classList.add('form-err'); return; }
  const tags=document.getElementById('m-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  await addTask({ title, description:document.getElementById('m-desc').value, priority:document.getElementById('m-priority').value, status:document.getElementById('m-status').value, deadline:document.getElementById('m-deadline').value, estHours:parseFloat(document.getElementById('m-hours').value)||0, tags });
  closeModal();
  showToast('✅','Task Created',`"${title}" saved`);
  renderPage(State.get().page);
}

function renderAddScheduleModal() {
  const s=State.get();
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header"><div class="modal-title">New Schedule Block</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="form-group"><label class="form-label">Title *</label><input class="form-input" id="s-title" placeholder="Block name…"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Start Time</label><input class="form-input" type="time" id="s-start" value="09:00"></div>
        <div class="form-group"><label class="form-label">End Time</label><input class="form-input" type="time" id="s-end" value="10:00"></div>
        <div class="form-group"><label class="form-label">Color</label><select class="form-select" id="s-color"><option value="purple">Purple</option><option value="teal">Teal</option><option value="amber">Amber</option><option value="green">Green</option><option value="pink">Pink</option></select></div>
      </div>
      <div class="form-group"><label class="form-label">Linked Task</label><select class="form-select" id="s-task"><option value="">None</option>${s.tasks.map(t=>`<option value="${t.id}">${t.title}</option>`).join('')}</select></div>
      <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitAddSchedule()">Add Block</button></div>
    </div>
  </div>`;
}
async function submitAddSchedule() {
  const title=document.getElementById('s-title').value.trim();
  if (!title) { document.getElementById('s-title').classList.add('form-err'); return; }
  await addSchedule({ title, start:document.getElementById('s-start').value, end:document.getElementById('s-end').value, color:document.getElementById('s-color').value, taskId:document.getElementById('s-task').value });
  closeModal();
  showToast('📅','Block Added',title);
  renderPage(State.get().page);
}

// ═══════════════════════════════════════════════════════════════
// SUBSCRIBE & BOOT
// ═══════════════════════════════════════════════════════════════
State.on('user', renderApp);
State.on('loading', ()=>{ if(State.get().loading) renderApp(); });
initFirebase();
</script>
