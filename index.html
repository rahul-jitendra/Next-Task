<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexTask — Offline-First Productivity</title>
<meta name="description" content="Offline-first productivity system with task management, activity tracking, and timetable scheduling.">
<meta name="theme-color" content="#0a0a0f">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222f;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --text:#f0f0f8;--text2:#9898b8;--text3:#5a5a7a;
  --accent:#7c5cfc;--accent2:#a78bfa;
  --teal:#0fb8a0;--teal2:#2dd4c0;
  --amber:#f59e0b;--amber2:#fbbf24;
  --red:#ef4444;--red2:#f87171;
  --green:#10b981;--green2:#34d399;
  --pink:#ec4899;--pink2:#f472b6;
  --mono:'JetBrains Mono',monospace;
  --sans:'Space Grotesk',sans-serif;
  --r:12px;--r2:8px;
  --ease:cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button,input,select,textarea{font-family:var(--sans)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
a{color:inherit;text-decoration:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(124,92,252,.4)}50%{box-shadow:0 0 0 6px rgba(124,92,252,0)}}
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{box-shadow:0 0 0 5px rgba(16,185,129,0)}}
@keyframes bgFloat{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:.9;transform:scale(1.08)}}
@keyframes slideToast{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s var(--ease) both}
.scale-in{animation:scaleIn .3s var(--ease) both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}

#app-root::before,#app-root::after{content:'';position:fixed;pointer-events:none;z-index:0;border-radius:50%}
#app-root::before{top:-30%;left:-15%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(124,92,252,.12) 0%,transparent 65%);animation:bgFloat 9s ease-in-out infinite}
#app-root::after{bottom:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(ellipse,rgba(15,184,160,.08) 0%,transparent 65%);animation:bgFloat 11s ease-in-out infinite reverse}
#app-root{position:relative;z-index:1}

.layout{display:flex;height:100vh}
.sidebar{width:240px;min-width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-logo{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--teal));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-.5px}.logo-text span{color:var(--accent2)}
.sidebar-status{margin:10px 12px;padding:7px 11px;border-radius:var(--r2);display:flex;align-items:center;gap:8px;font-size:12px}
.st-online{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--green2)}
.st-offline{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red2)}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:currentColor}
.st-online .status-dot{animation:dotPulse 2s ease-in-out infinite}
.sidebar-nav{padding:8px 0;flex:1;overflow-y:auto}
.nav-sec{padding:12px 16px 4px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;margin:1px 8px;cursor:pointer;border-radius:var(--r2);font-size:14px;color:var(--text2);transition:all .2s var(--ease);position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(124,92,252,.15);color:var(--accent2);font-weight:500}
.nav-item.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:0 2px 2px 0}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg3);border-radius:var(--r2);cursor:pointer;transition:background .2s}
.user-row:hover{background:var(--bg4)}
.user-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff}
.user-name{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;border:none;color:var(--text3);font-size:14px;transition:all .2s;flex-shrink:0}
.logout-btn:hover{background:rgba(239,68,68,.15);color:var(--red2)}

.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{height:60px;background:rgba(17,17,24,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:18px;font-weight:600;flex:1}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;width:200px;transition:border-color .2s}
.search-wrap:focus-within{border-color:var(--border2)}
.search-wrap input{background:none;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:13px;width:100%}
.search-wrap input::placeholder{color:var(--text3)}
.page-content{padding:28px;flex:1}

.btn{padding:8px 16px;border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--sans);transition:all .2s var(--ease);display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg4);color:var(--text)}
.icon-btn{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text3);border:none;background:transparent;transition:all .2s}
.icon-btn:hover{background:var(--bg4);color:var(--text2)}
.icon-btn.play{background:rgba(16,185,129,.1);color:var(--green2)}
.icon-btn.play:hover{background:rgba(16,185,129,.25)}
.icon-btn.del{color:var(--red2)}
.icon-btn.del:hover{background:rgba(239,68,68,.12)}

.sec-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.sec-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
.sec-sub{font-size:14px;color:var(--text2);margin-top:3px}

.grid{display:grid;gap:16px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:1fr 1fr}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.g4,.g3,.g2{grid-template-columns:1fr}.sidebar{width:56px;min-width:56px}.hide-sm{display:none!important}.topbar-title{font-size:15px}}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;transition:all .25s var(--ease)}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;opacity:.08;transform:translate(30%,-30%);background:var(--sc,var(--accent))}
.stat-icon{font-size:22px;margin-bottom:12px}
.stat-num{font-size:32px;font-weight:700;letter-spacing:-1px;font-family:var(--mono);line-height:1}
.stat-label{font-size:13px;color:var(--text2);margin-top:6px}
.stat-trend{font-size:12px;font-weight:600;margin-top:8px;color:var(--green2)}

.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.t-purple{background:rgba(124,92,252,.15);color:var(--accent2)}
.t-teal{background:rgba(15,184,160,.15);color:var(--teal2)}
.t-amber{background:rgba(245,158,11,.15);color:var(--amber2)}
.t-red{background:rgba(239,68,68,.15);color:var(--red2)}
.t-green{background:rgba(16,185,129,.15);color:var(--green2)}
.t-pink{background:rgba(236,72,153,.15);color:var(--pink2)}
.t-gray{background:rgba(255,255,255,.06);color:var(--text2)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-high{background:var(--red)}.d-medium{background:var(--amber)}.d-low{background:var(--green)}

.prog-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .8s var(--ease)}
.pf-purple{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.pf-teal{background:linear-gradient(90deg,var(--teal),var(--teal2))}
.pf-amber{background:linear-gradient(90deg,var(--amber),var(--amber2))}
.pf-green{background:linear-gradient(90deg,var(--green),var(--green2))}

.task-list{display:flex;flex-direction:column;gap:10px}
.task-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;display:flex;align-items:flex-start;gap:14px;transition:all .2s var(--ease);position:relative;overflow:hidden}
.task-item:hover{border-color:var(--border2);background:var(--bg3)}
.task-item.is-completed{opacity:.5}
.task-item.is-active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.task-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;margin-top:1px;font-size:11px}
.task-check:hover{border-color:var(--accent)}
.task-check.is-done{background:var(--green);border-color:var(--green);color:#fff}
.task-body{flex:1;min-width:0}
.task-title-row{font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.task-title.striked{text-decoration:line-through;color:var(--text3)}
.task-desc-text{font-size:13px;color:var(--text2);margin-top:3px;line-height:1.5}
.task-meta{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.task-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.dl-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);font-family:var(--mono)}
.dl-urgent{color:var(--red2)}

.tab-group{display:flex;background:var(--bg3);border-radius:var(--r2);padding:4px;width:fit-content;margin-bottom:20px;flex-wrap:wrap;gap:2px}
.tab{padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;border-radius:6px;color:var(--text2);transition:all .2s;white-space:nowrap}
.tab.active{background:var(--bg4);color:var(--text)}
.tab:hover:not(.active){color:var(--text)}

.form-group{margin-bottom:16px}
.form-label{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:7px;display:block}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;font-size:14px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-select{appearance:none;cursor:pointer}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:flex;gap:14px;flex-wrap:wrap}
.form-row .form-group{flex:1;min-width:140px}
.form-err{border-color:var(--red)!important}

.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;animation:scaleIn .2s var(--ease)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:scaleIn .25s var(--ease)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-title{font-size:18px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg3);border:none;color:var(--text3);font-size:16px;transition:all .2s}
.modal-close:hover{background:var(--bg4);color:var(--text)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}

.timer-ring{position:relative;width:180px;height:180px;margin:0 auto 20px}
.timer-ring svg{transform:rotate(-90deg)}
.ring-bg{stroke:var(--bg4);fill:none}
.ring-fill{fill:none;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .4s}
.timer-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:150px}
.timer-time{font-family:var(--mono);font-size:26px;font-weight:600;line-height:1;transition:color .4s}
.timer-sub{font-size:11px;color:var(--text3);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.timetable{display:flex;flex-direction:column;position:relative}
.timetable::before{content:'';position:absolute;left:62px;top:0;bottom:0;width:1px;background:var(--border)}
.time-slot{display:flex;gap:14px;min-height:56px;position:relative}
.time-lbl{font-family:var(--mono);font-size:11px;color:var(--text3);width:50px;text-align:right;padding-top:4px;flex-shrink:0}
.slot-body{flex:1;padding:4px 0 4px 14px}
.now-line{display:flex;align-items:center;gap:8px;margin:-3px 0;z-index:5;position:relative}
.now-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;margin-left:54px}
.now-bar{flex:1;height:1px;background:var(--red);opacity:.6}
.sched-block{padding:9px 13px;border-radius:var(--r2);margin-bottom:4px;font-size:13px;font-weight:500;border-left:3px solid;cursor:pointer;transition:all .2s}
.sched-block:hover{transform:translateX(3px);filter:brightness(1.1)}
.sb-purple{background:rgba(124,92,252,.12);border-color:var(--accent);color:var(--accent2)}
.sb-teal{background:rgba(15,184,160,.12);border-color:var(--teal);color:var(--teal2)}
.sb-amber{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber2)}
.sb-green{background:rgba(16,185,129,.12);border-color:var(--green);color:var(--green2)}
.sb-pink{background:rgba(236,72,153,.12);border-color:var(--pink);color:var(--pink2)}
.sb-gray{background:rgba(255,255,255,.05);border-color:var(--text3);color:var(--text2)}
.sched-time{font-size:11px;opacity:.7;font-family:var(--mono);margin-top:2px}

.act-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg3);border-radius:var(--r2);border:1px solid var(--border);transition:all .2s;margin-bottom:8px}
.act-item:hover{border-color:var(--border2)}
.act-dur{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--teal2);min-width:52px}
.act-note{font-size:12px;color:var(--text2);margin-top:2px}
.act-time{font-family:var(--mono);font-size:11px;color:var(--text3);white-space:nowrap}

.bar-chart{display:flex;align-items:flex-end;justify-content:space-between;height:150px;gap:5px;padding:0 4px}
.bar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .8s var(--ease);cursor:pointer}
.bar:hover{filter:brightness(1.25)}
.bv{background:linear-gradient(180deg,var(--accent),rgba(124,92,252,.3))}
.bt{background:linear-gradient(180deg,var(--teal),rgba(15,184,160,.3))}
.bar-lbl{font-size:10px;color:var(--text3);font-family:var(--mono)}
.bar-val{font-size:10px;font-weight:600;color:var(--text2);font-family:var(--mono)}

.donut-wrap{display:flex;align-items:center;gap:22px}
.donut-chart{position:relative;width:120px;height:120px;flex-shrink:0}
.donut-chart svg{transform:rotate(-90deg)}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.donut-num{font-size:22px;font-weight:700;font-family:var(--mono);line-height:1}
.donut-sub{font-size:10px;color:var(--text3);margin-top:2px}
.donut-legend{display:flex;flex-direction:column;gap:8px;flex:1}
.leg-item{display:flex;align-items:center;gap:8px;font-size:13px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-label{color:var(--text2);flex:1}
.leg-val{font-family:var(--mono);font-size:12px;font-weight:500}

.heatmap{display:grid;grid-template-columns:repeat(28,1fr);gap:3px}
.hcell{aspect-ratio:1;border-radius:3px;background:var(--bg4);cursor:pointer;transition:transform .15s}
.hcell:hover{transform:scale(1.3)}
.h1{background:rgba(124,92,252,.18)}.h2{background:rgba(124,92,252,.38)}.h3{background:rgba(124,92,252,.58)}.h4{background:rgba(124,92,252,.78)}.h5{background:rgba(124,92,252,.98)}

.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:13px 16px;display:flex;align-items:flex-start;gap:10px;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideToast .4s var(--ease)}
.toast-body .ttl{font-weight:600;font-size:14px}
.toast-body .sub{font-size:12px;color:var(--text2);margin-top:2px}

.schema-tbl{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono)}
.schema-tbl th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
.schema-tbl td{padding:8px 12px;border-bottom:1px solid var(--border)}
.schema-tbl tr:last-child td{border-bottom:none}
.schema-tbl tr:hover td{background:var(--bg3)}
.pk{background:rgba(124,92,252,.15);color:var(--accent2);font-size:9px;padding:2px 5px;border-radius:4px;font-weight:700}
.fk{background:rgba(15,184,160,.15);color:var(--teal2);font-size:9px;padding:2px 5px;border-radius:4px;font-weight:700}
.ty-str{color:var(--amber2)}.ty-int{color:var(--teal2)}.ty-bool{color:var(--pink2)}.ty-ts{color:var(--text2)}

/* Roadmap */
.roadmap{display:flex;flex-direction:column;position:relative}
.roadmap::before{content:'';position:absolute;left:20px;top:24px;bottom:24px;width:2px;background:var(--border)}
.rm-item{display:flex;gap:20px;padding-bottom:24px;position:relative}
.rm-dot{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:2px solid;background:var(--bg2);position:relative;z-index:1}
.rm-done{border-color:var(--green);color:var(--green2)}
.rm-active{border-color:var(--accent);color:var(--accent2);background:rgba(124,92,252,.1);animation:pulse 2.5s ease-in-out infinite}
.rm-next{border-color:var(--border2);color:var(--text3)}
.rm-content{flex:1;padding-top:8px}
.rm-phase{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.rm-title{font-size:15px;font-weight:600;margin-bottom:6px}
.rm-desc{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.5}
.rm-tags{display:flex;flex-wrap:wrap;gap:6px}
.rm-actions{display:flex;gap:6px;margin-top:10px}

.arch-section{padding:18px;border-bottom:1px solid var(--border)}
.arch-section:last-child{border-bottom:none}
.arch-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.arch-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.an{padding:7px 13px;border-radius:var(--r2);font-size:12px;font-weight:500;border:1px solid;display:inline-flex;align-items:center;gap:5px;transition:transform .2s}
.an:hover{transform:translateY(-1px)}
.an-p{background:rgba(124,92,252,.1);border-color:rgba(124,92,252,.3);color:var(--accent2)}
.an-t{background:rgba(15,184,160,.1);border-color:rgba(15,184,160,.3);color:var(--teal2)}
.an-a{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--amber2)}
.an-g{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--green2)}
.an-gr{background:var(--bg3);border-color:var(--border2);color:var(--text2)}

.dev-card{padding:20px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--border);text-align:center;transition:all .25s}
.dev-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.dev-icon{font-size:34px;margin-bottom:10px}
.dev-name{font-size:14px;font-weight:600;margin-bottom:5px}
.dev-desc{font-size:12px;color:var(--text2);line-height:1.6}

.code-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;font-family:var(--mono);font-size:12px;line-height:1.8;overflow-x:auto}
.ck{color:var(--accent2)}.cs{color:var(--amber2)}.cc{color:var(--text3)}.cf{color:var(--green2)}

.ev-row{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg3);border-radius:var(--r2);border:1px solid var(--border);margin-bottom:7px;transition:all .2s}
.ev-row:hover{border-color:var(--border2)}
.ev-badge{padding:3px 8px;border-radius:5px;font-family:var(--mono);font-size:10px;font-weight:600;white-space:nowrap}
.ev-create{background:rgba(16,185,129,.1);color:var(--green2)}
.ev-update{background:rgba(245,158,11,.1);color:var(--amber2)}
.ev-delete{background:rgba(239,68,68,.1);color:var(--red2)}
.ev-sync{background:rgba(124,92,252,.1);color:var(--accent2)}

.proto{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono)}
.proto-on{background:rgba(16,185,129,.12);color:var(--green2);border:1px solid rgba(16,185,129,.2)}
.proto-off{background:rgba(255,255,255,.05);color:var(--text3);border:1px solid var(--border)}
.proto-dot{width:5px;height:5px;border-radius:50%;background:currentColor}

.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:44px;width:440px;max-width:95vw;text-align:center;position:relative;z-index:1;animation:scaleIn .4s var(--ease)}
.login-logo{width:54px;height:54px;border-radius:14px;margin:0 auto 18px;background:linear-gradient(135deg,var(--accent),var(--teal));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff}
.login-title{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:28px;line-height:1.6}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px 20px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border2);font-size:15px;font-weight:600;color:var(--text);cursor:pointer;font-family:var(--sans);transition:all .25s var(--ease)}
.google-btn:hover{background:var(--bg4);border-color:rgba(255,255,255,.25);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.google-btn:active{transform:scale(.98)}
.google-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.login-feats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:24px;text-align:left}
.login-feat{padding:11px;background:var(--bg3);border-radius:var(--r2);border:1px solid var(--border);font-size:12px;color:var(--text2);display:flex;gap:8px;align-items:flex-start}
.offline-note{margin-top:14px;font-size:12px;color:var(--text3);padding:10px 13px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid var(--border)}

.spinner{width:36px;height:36px;border:3px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto}
.loading-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-size:14px;color:var(--text2)}
.empty-state{padding:56px 24px;text-align:center;color:var(--text3)}
.empty-icon{font-size:44px;margin-bottom:14px}
.empty-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:6px}
.empty-desc{font-size:13px;line-height:1.6;max-width:280px;margin:0 auto 20px}

.offline-banner{background:rgba(239,68,68,.08);border-bottom:1px solid rgba(239,68,68,.18);padding:8px 24px;font-size:13px;color:var(--red2);display:flex;align-items:center;gap:8px}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6)}
</style>
</head>
<body>
<div id="app-root"></div>
<script>
// ─────────────────────────────────────────────────────────────
// FIREBASE CONFIG — paste your values here
// ─────────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAftpKoSOXL8q5luSrfmdrgiBv_EazKGSo",
  authDomain: "task-manager-rahul.firebaseapp.com",
  projectId: "task-manager-rahul",
  storageBucket: "task-manager-rahul.firebasestorage.app",
  messagingSenderId: "659155289981",
  appId: "1:659155289981:web:abeaaf47714b3122cd2e14"
};
const DEMO_MODE = FIREBASE_CONFIG.apiKey === "YOUR_API_KEY";

// ─────────────────────────────────────────────────────────────
// STATE — single source of truth, listeners re-render on change
// ─────────────────────────────────────────────────────────────
const State = (() => {
  const L = {};
  const S = {
    user: undefined, page: 'dashboard',
    tasks: [], activities: [], schedules: [], roadmap: [],
    loading: true, online: navigator.onLine,
    timerRunning: false, timerSeconds: 0, timerTaskId: '', timerStartedAt: null,
    taskFilter: 'all', taskSearch: '',
  };
  const emit = k => (L[k]||[]).forEach(fn=>fn(S));
  const set = u => { Object.assign(S,u); Object.keys(u).forEach(emit); };
  const on  = (k,fn) => { L[k]=L[k]||[]; L[k].push(fn); };
  const get = () => S;
  return { set, get, on };
})();

// ─────────────────────────────────────────────────────────────
// FIREBASE / STORAGE
// ─────────────────────────────────────────────────────────────
let db=null, auth=null;

function initFirebase() {
  if (DEMO_MODE) { initDemo(); return; }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    auth = firebase.auth();
    db   = firebase.firestore();
    db.enablePersistence({ synchronizeTabs:true }).catch(()=>{});
    auth.onAuthStateChanged(u => {
      State.set({ user:u||null, loading:false });
      if (u) loadData(u.uid);
    });
  } catch(e) { console.warn('Firebase failed, using demo mode', e); initDemo(); }
}

function initDemo() {
  const saved = JSON.parse(localStorage.getItem('nextask')||'{}');
  State.set({
    user:       { uid:'demo', displayName:'Demo User', email:'demo@nextask.app', photoURL:null },
    tasks:      saved.tasks      || [],
    activities: saved.activities || [],
    schedules:  saved.schedules  || [],
    roadmap:    saved.roadmap    || [],
    loading:    false,
  });
}
function persist() {
  const s = State.get();
  localStorage.setItem('nextask', JSON.stringify({
    tasks:s.tasks, activities:s.activities, schedules:s.schedules, roadmap:s.roadmap
  }));
}

function loadData(uid) {
  const col = c => db.collection('users').doc(uid).collection(c);
  col('tasks').orderBy('createdAt','desc').onSnapshot(snap=>{
    State.set({ tasks: snap.docs.map(d=>({id:d.id,...d.data()})) });
  });
  col('activities').orderBy('startTime','desc').onSnapshot(snap=>{
    State.set({ activities: snap.docs.map(d=>({id:d.id,...d.data()})) });
  });
  col('schedules').onSnapshot(snap=>{
    State.set({ schedules: snap.docs.map(d=>({id:d.id,...d.data()})) });
  });
  col('roadmap').orderBy('order','asc').onSnapshot(snap=>{
    State.set({ roadmap: snap.docs.map(d=>({id:d.id,...d.data()})) });
  });
}

// ─────────────────────────────────────────────────────────────
// CRUD — optimistic updates everywhere
// ─────────────────────────────────────────────────────────────
const genId = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
const now   = () => new Date().toISOString();
const uid   = () => State.get().user?.uid;
const col   = c  => db.collection('users').doc(uid()).collection(c);

async function addTask(data) {
  const task = { id:genId(), ...data, loggedHours:0, createdAt:now(), updatedAt:now() };
  State.set({ tasks:[task,...State.get().tasks] });
  persist();
  if (!DEMO_MODE && uid()) {
    try { await col('tasks').doc(task.id).set(task); } catch(e){ console.error(e); }
  }
  return task.id;
}
async function updateTask(id, data) {
  State.set({ tasks: State.get().tasks.map(t=>t.id===id?{...t,...data,updatedAt:now()}:t) });
  persist();
  if (!DEMO_MODE && uid()) {
    try { await col('tasks').doc(id).update({...data,updatedAt:now()}); } catch(e){ console.error(e); }
  }
}
async function deleteTask(id) {
  State.set({ tasks: State.get().tasks.filter(t=>t.id!==id) });
  persist();
  if (!DEMO_MODE && uid()) {
    try { await col('tasks').doc(id).delete(); } catch(e){ console.error(e); }
  }
}
async function addActivity(data) {
  const act  = { id:genId(), ...data, createdAt:now() };
  const task = State.get().tasks.find(t=>t.id===data.taskId);
  State.set({
    activities: [act,...State.get().activities],
    tasks: State.get().tasks.map(t=>t.id===data.taskId
      ? {...t, loggedHours:(t.loggedHours||0)+data.durationMin/60, status:t.status==='pending'?'active':t.status}
      : t)
  });
  persist();
  if (!DEMO_MODE && uid()) {
    try {
      await col('activities').doc(act.id).set(act);
      if (task) await col('tasks').doc(task.id).update({
        loggedHours:(task.loggedHours||0)+data.durationMin/60,
        status:task.status==='pending'?'active':task.status, updatedAt:now()
      });
    } catch(e){ console.error(e); }
  }
}
async function addSchedule(data) {
  const s = { id:genId(), ...data, createdAt:now() };
  State.set({ schedules:[...State.get().schedules,s] });
  persist();
  if (!DEMO_MODE && uid()) {
    try { await col('schedules').doc(s.id).set(s); } catch(e){ console.error(e); }
  }
}
async function deleteSchedule(id) {
  State.set({ schedules: State.get().schedules.filter(x=>x.id!==id) });
  persist();
  if (!DEMO_MODE && uid()) {
    try { await col('schedules').doc(id).delete(); } catch(e){ console.error(e); }
  }
}
async function addRoadmapItem(data) {
  const item = { id:genId(), ...data, order:State.get().roadmap.length, createdAt:now() };
  State.set({ roadmap:[...State.get().roadmap, item] });
  persist();
  if (!DEMO_MODE && uid()) {
    try { await col('roadmap').doc(item.id).set(item); } catch(e){ console.error(e); }
  }
}
async function updateRoadmapItem(id, data) {
  State.set({ roadmap: State.get().roadmap.map(r=>r.id===id?{...r,...data}:r) });
  persist();
  if (!DEMO_MODE && uid()) {
    try { await col('roadmap').doc(id).update(data); } catch(e){ console.error(e); }
  }
}
async function deleteRoadmapItem(id) {
  State.set({ roadmap: State.get().roadmap.filter(r=>r.id!==id) });
  persist();
  if (!DEMO_MODE && uid()) {
    try { await col('roadmap').doc(id).delete(); } catch(e){ console.error(e); }
  }
}

// Auth
async function signInGoogle() {
  if (DEMO_MODE) return;
  try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
  catch(e) { toast('❌','Sign In Failed',e.message); }
}
function signOutUser() {
  if (DEMO_MODE) { State.set({user:null,tasks:[],activities:[],schedules:[],roadmap:[]}); renderApp(); return; }
  auth.signOut();
}
window.addEventListener('online',  ()=>{ State.set({online:true});  renderApp(); });
window.addEventListener('offline', ()=>{ State.set({online:false}); renderApp(); });

// ─────────────────────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────────────────────
let _tt=null;
function toast(icon, title, sub='') {
  document.getElementById('_toast')?.remove();
  clearTimeout(_tt);
  const el=document.createElement('div');
  el.id='_toast'; el.className='toast';
  el.innerHTML=`<span style="font-size:18px;flex-shrink:0">${icon}</span><div class="toast-body"><div class="ttl">${title}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;
  document.body.appendChild(el);
  _tt=setTimeout(()=>el.remove(),3500);
}

// ─────────────────────────────────────────────────────────────
// TIMER
// ─────────────────────────────────────────────────────────────
let _ti=null;
function startTimer(taskId) {
  State.set({timerRunning:true,timerTaskId:taskId,timerStartedAt:new Date(),timerSeconds:0});
  _ti=setInterval(()=>{ State.set({timerSeconds:State.get().timerSeconds+1}); syncTimerUI(); },1000);
  syncTimerUI();
}
function stopTimer() { clearInterval(_ti); _ti=null; State.set({timerRunning:false}); syncTimerUI(); }
function resetTimer() { stopTimer(); State.set({timerSeconds:0,timerTaskId:'',timerStartedAt:null}); syncTimerUI(); }
const pad = n=>String(n).padStart(2,'0');
const fmtTime = s=>{ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return `${pad(h)}:${pad(m)}:${pad(sec)}`; };
function syncTimerUI() {
  const s=State.get();
  const tEl=document.getElementById('timer-display');
  const sEl=document.getElementById('timer-sub');
  const rEl=document.getElementById('timer-ring');
  const bEl=document.getElementById('timer-toggle-btn');
  const nEl=document.getElementById('session-note-wrap');
  if (!tEl) return;
  tEl.textContent=fmtTime(s.timerSeconds);
  tEl.style.color=s.timerRunning?'var(--green2)':'var(--text)';
  if (sEl) sEl.textContent=s.tasks.find(t=>t.id===s.timerTaskId)?.title||'No task selected';
  if (rEl) { const off=490-Math.min(s.timerSeconds/3600,1)*490; rEl.style.strokeDashoffset=off; rEl.style.stroke=s.timerRunning?'var(--green)':'var(--accent)'; }
  if (bEl) { bEl.textContent=s.timerRunning?'⏹ Stop Session':'▶ Start Session'; bEl.style.background=s.timerRunning?'var(--red)':''; }
  if (nEl) nEl.style.display=(!s.timerRunning&&s.timerSeconds>0)?'block':'none';
}
async function saveSession() {
  const s=State.get();
  if (!s.timerTaskId||s.timerSeconds<10) { toast('⚠️','Too short','Record at least 10 seconds'); return; }
  const mins=Math.max(1,Math.floor(s.timerSeconds/60));
  const end=new Date(), start=s.timerStartedAt||new Date(end-mins*60000);
  const note=document.getElementById('session-note')?.value||'';
  await addActivity({ taskId:s.timerTaskId, taskName:s.tasks.find(t=>t.id===s.timerTaskId)?.title||'Unknown', startTime:start.toISOString(), endTime:end.toISOString(), durationMin:mins, notes:note });
  resetTimer();
  toast('💾','Session Saved',`${mins} minutes logged`);
}

// ─────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────
const PRI_DOT={high:'d-high',medium:'d-medium',low:'d-low'};
const PRI_TAG={high:'t-red',medium:'t-amber',low:'t-green'};
const TAG_C={dev:'t-purple',backend:'t-teal',design:'t-amber',iot:'t-teal',db:'t-amber',docs:'t-gray',mobile:'t-pink',research:'t-teal'};
const tagCls=t=>TAG_C[t]||'t-gray';
function dlBadge(d) {
  if(!d) return '';
  const diff=Math.ceil((new Date(d)-new Date())/86400000);
  if(diff<0)  return `<span class="dl-badge dl-urgent">⚠ Overdue</span>`;
  if(diff===0)return `<span class="dl-badge dl-urgent">🔥 Today</span>`;
  if(diff===1)return `<span class="dl-badge dl-urgent">⏰ Tomorrow</span>`;
  return `<span class="dl-badge">📅 ${d}</span>`;
}
const progColor=p=>p>=80?'pf-green':p>=50?'pf-teal':p>=20?'pf-amber':'pf-purple';
const fmtDur=m=>{ const h=Math.floor(m/60); return h?`${h}h ${m%60}m`:`${m}m`; };
const fmtT=iso=>{ if(!iso)return '—'; const d=new Date(iso); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; };

// ─────────────────────────────────────────────────────────────
// RENDER ENGINE
// ─────────────────────────────────────────────────────────────
function renderApp() {
  const s=State.get(), root=document.getElementById('app-root');
  if (s.user===undefined) { root.innerHTML=`<div class="loading-page"><div class="spinner"></div><span>Loading NexTask…</span></div>`; return; }
  if (!s.user) { root.innerHTML=renderLogin(); return; }
  root.innerHTML=renderShell();
  document.getElementById('global-search')?.addEventListener('input',e=>{ State.set({taskSearch:e.target.value}); if(State.get().page==='tasks') refreshPage(); });
  refreshPage();
}

function refreshPage() {
  const s=State.get();
  const el=document.getElementById('page-container');
  if (!el) return;
  const map={dashboard:renderDashboard,tasks:renderTasks,activity:renderActivity,timetable:renderTimetable,analytics:renderAnalytics,architecture:renderArchitecture,schema:renderSchema,sync:renderSync,devices:renderDevices,roadmap:renderRoadmap};
  el.innerHTML=(map[s.page]||renderDashboard)();
  if (s.page==='activity') syncTimerUI();
  if (s.page==='activity') {
    document.getElementById('session-task-sel')?.addEventListener('change',e=>State.set({timerTaskId:e.target.value}));
  }
  // update nav badge
  const badge=document.querySelector('.nav-badge');
  if (badge) badge.textContent=s.tasks.filter(t=>t.status==='pending').length;
}

// subscribe — any data change refreshes current page
['tasks','activities','schedules','roadmap'].forEach(k=>{
  State.on(k, ()=>{
    const s=State.get();
    if (!s.user||s.user===undefined) return;
    if (document.getElementById('page-container')) refreshPage();
  });
});
State.on('user', renderApp);

function nav(page) {
  State.set({page, taskFilter:'all', taskSearch:''});
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
  const titles={dashboard:'Dashboard',tasks:'Task Manager',activity:'Activity Tracker',timetable:'Timetable',analytics:'Analytics',architecture:'Architecture',schema:'DB Schema',sync:'Sync Protocol',devices:'Edge Devices',roadmap:'Roadmap'};
  const t=document.getElementById('page-title'); if(t) t.textContent=titles[page]||page;
  refreshPage();
}

// ─────────────────────────────────────────────────────────────
// LOGIN
// ─────────────────────────────────────────────────────────────
function renderLogin() {
  return `<div class="login-page">
    <div class="login-card">
      <div class="login-logo">N</div>
      <div class="login-title">Welcome to NexTask</div>
      <div class="login-sub">Offline-first productivity system.<br>Works fully without internet.</div>
      ${!State.get().online?`<div class="offline-note">⚠️ You're offline. Google sign-in needs a connection once.</div>`:''}
      <button class="google-btn" onclick="signInGoogle()">
        <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      ${DEMO_MODE?`<button class="google-btn" onclick="initDemo();renderApp();" style="margin-top:10px;border-color:rgba(124,92,252,.3);color:var(--accent2)">⚡ Try Demo Mode</button>`:''}
      <div class="login-feats">
        ${[['🔌','Offline First','Works without internet'],['🔄','Auto Sync','Firestore persistence'],['📱','All Devices','Desktop, mobile, ESP32'],['🔒','Secure','Google Auth + rules']].map(([i,t,d])=>`<div class="login-feat"><span style="font-size:15px;flex-shrink:0">${i}</span><div><div style="font-weight:600;font-size:12px;color:var(--text);margin-bottom:2px">${t}</div><div>${d}</div></div></div>`).join('')}
      </div>

const HOURS=['07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];
function renderTimetable() {
  const s=State.get(), now=new Date(), nm=now.getHours()*60+now.getMinutes();
  const blocks=s.schedules;
  const totalMin=blocks.reduce((a,b)=>{const st=parseInt(b.start)*60+parseInt(b.start.split(':')[1]),en=parseInt(b.end)*60+parseInt(b.end.split(':')[1]);return a+(en-st);},0);
  return `<div class="page-content">
    <div class="sec-header fade-up">
      <div><div class="sec-title">Timetable</div><div class="sec-sub">${now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div></div>
      <button class="btn btn-primary" onclick="openModal('addSchedule')">+ Add Block</button>
    </div>

      ? emptyState('📅','No schedule blocks yet','Add time blocks to plan your day.','+ Add Block',"openModal('addSchedule')")
      : `<div class="grid g2">
          <div class="card">
            <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px">Day View</div>
            <div class="timetable">
              ${HOURS.map((h,i)=>{
                const hm=parseInt(h)*60+parseInt(h.split(':')[1]);
                const nx=i<HOURS.length-1?parseInt(HOURS[i+1])*60+parseInt(HOURS[i+1].split(':')[1]):hm+60;
                const inSlot=blocks.filter(b=>{const bs=parseInt(b.start)*60+parseInt(b.start.split(':')[1]);return bs>=hm&&bs<nx;});
                const showNow=nm>=hm&&nm<nx;
                return `<div class="time-slot"><div class="time-lbl">${h}</div><div class="slot-body">${showNow?`<div class="now-line"><div class="now-dot"></div><div class="now-bar"></div></div>`:''
                }${inSlot.map(b=>`<div class="sched-block sb-${b.color||'gray'}" title="Click to remove" onclick="delBlock('${b.id}')">${b.title}<div class="sched-time">${b.start} – ${b.end}</div></div>`).join('')}</div></div>`;
              }).join('')}

          </div>

              <div style="font-size:13px;font-weight:600;margin-bottom:12px">Summary</div>

            </div>
            <div class="card">

              ${blocks.map(b=>{const C={purple:'var(--accent)',teal:'var(--teal)',amber:'var(--amber)',green:'var(--green)',pink:'var(--pink)'};return `<div style="display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg3);border-radius:8px;font-size:13px;margin-bottom:5px"><div style="width:7px;height:7px;border-radius:50%;background:${C[b.color]||'var(--text3)'};flex-shrink:0"></div><span style="flex:1;font-weight:500">${b.title}</span><span style="font-family:var(--mono);font-size:10px;color:var(--text3)">${b.start}–${b.end}</span><button class="icon-btn del" style="width:20px;height:20px" onclick="delBlock('${b.id}')">✕</button></div>`;}).join('')}

}

function renderAnalytics() {
  const s=State.get(), tasks=s.tasks, acts=s.activities;
  const done=tasks.filter(t=>t.status==='completed').length;
  const rate=tasks.length?Math.round(done/tasks.length*100):0;
  const weekH=Array(7).fill(0);
  acts.forEach(a=>{const d=new Date(a.startTime),idx=(d.getDay()+6)%7;weekH[idx]+=(a.durationMin||0)/60;});
  const byTag={}; tasks.forEach(t=>(t.tags||[]).forEach(tg=>{byTag[tg]=(byTag[tg]||0)+1;}));

  const el=document.getElementById('modal-container');

  if (type==='addTask')     el.innerHTML=modalTask();
  if (type==='addSchedule') el.innerHTML=modalSchedule();
  if (type==='addRoadmap')  el.innerHTML=modalRoadmap();

async function submitTask() {
  const titleEl=document.getElementById('m-title');
  if (!titleEl) return;
  const title=titleEl.value.trim();
  if (!title) { titleEl.classList.add('form-err'); titleEl.focus(); return; }
  const description = document.getElementById('m-desc').value;
  const priority    = document.getElementById('m-priority').value;
  const status      = document.getElementById('m-status').value;
  const deadline    = document.getElementById('m-deadline').value;
  const estHours    = parseFloat(document.getElementById('m-hours').value)||0;
  const tags        = document.getElementById('m-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const btn=document.getElementById('save-task-btn');
  if (btn) { btn.disabled=true; btn.textContent='Saving…'; }
  await addTask({ title, description, priority, status, deadline, estHours, tags });
  closeModal();
  toast('✅','Task Created',`"${title}" saved`);
}

        <div class="form-group"><label class="form-label">Tags</label><input class="form-input" id="r-tags" placeholder="SQLite, Auth, IoT…"></div>
      </div>
      <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="save-rm-btn" onclick="submitRoadmap()">Add Phase</button></div>
    </div>
  </div>`;
}

async function submitRoadmap() {
  const titleEl=document.getElementById('r-title');
  if (!titleEl) return;
  const title=titleEl.value.trim();
  if (!title) { titleEl.classList.add('form-err'); titleEl.focus(); return; }
  const phase       = document.getElementById('r-phase').value.trim();
  const description = document.getElementById('r-desc').value.trim();
  const status      = document.getElementById('r-status').value;
  const tags        = document.getElementById('r-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const btn=document.getElementById('save-rm-btn');
  if (btn) { btn.disabled=true; btn.textContent='Saving…'; }
  await addRoadmapItem({ phase, title, description, status, tags });
  closeModal();
  toast('🗺','Phase Added',title);
}

// ─────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────
initFirebase();
</script>
</body>
</html>
